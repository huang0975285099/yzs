# ================================
# 云值守系统 - www.yzs88.com
# ================================

# 1. 根域名 yzs88.com (80端口) → 跳转到 www.yzs88.com
server {
    listen 80;
    listen [::]:80;
    server_name yzs88.com;
    return 301 https://www.yzs88.com$request_uri;
}

# 2. www域名 (80端口) → 跳转到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name www.yzs88.com;
    return 301 https://www.yzs88.com$request_uri;
}

# 3. www域名 (443端口) → 云值守系统
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.yzs88.com;

    # SSL证书路径
    ssl_certificate /etc/nginx/ssl/www.yzs88.com.pem;
    ssl_certificate_key /etc/nginx/ssl/www.yzs88.com.key;

    # SSL优化配置
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:HIGH:!aNULL:!MD5:!RC4;
    ssl_prefer_server_ciphers on;

    # 安全头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Docker 内置 DNS，运行时解析容器名（避免启动时找不到 upstream 报错）
    resolver 127.0.0.11 valid=10s ipv6=off;

    # 反向代理到云值守前端
    location / {
        set $frontend yzs-frontend:18880;
        proxy_pass http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API 直接代理到后端
    location /api/ {
        set $backend yzs-backend:18881;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /moyu {
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # support websocket
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        rewrite ^/moyu/(.*)$ /moyu/api/$1 break;
        proxy_pass http://host.docker.internal:8088;
    }
}
